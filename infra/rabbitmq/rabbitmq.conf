# Carrega as definitions em /etc/rabbitmq/definitions.json no boot.
# Declara o DLX (`vistoria.events.dlx`) + DLQ (`vistoria.events.dlq`)
# antes dos apps subirem. Encerra a pendência aberta desde a Sprint 03.
#
# O exchange principal `vistoria.events` e as queues dos consumers
# (`apps-api.events` no BE, `integrations.events` no IN) continuam
# sendo declarados pelos próprios apps via assertExchange/assertQueue —
# eles têm `durable=true` e são idempotentes.
load_definitions = /etc/rabbitmq/definitions.json
